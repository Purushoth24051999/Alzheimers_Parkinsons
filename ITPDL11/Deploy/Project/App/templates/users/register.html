<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>

  <style>
    body {
      background: linear-gradient(to right, #15B9D9, #6c9ba5);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Centered clean form */
    .register-box {
      width: 420px;
      background: #ffffff;
      padding: 35px 40px;
      border-radius: 18px;
      box-shadow: 0px 10px 35px rgba(0,0,0,0.15);
      animation: fadeIn 0.7s ease-in-out;
    }

    h2 {
      text-align: center;
      font-weight: 800;
      margin-bottom: 25px;
      color: #219ce4;
    }

    label {
      font-weight: 600;
      color: #219ce4;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1.8px solid #ffd4c4;
      border-radius: 10px;
      background: #fff8f5;
      margin-bottom: 16px;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #15B9D9;
      box-shadow: 0 0 7px rgba(255,140,106,0.4);
      outline: none;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #62b2e0;
      border: none;
      color: white;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-submit:hover {
      background: #8abedb;
    }

    .copy-text {
      text-align: center;
      margin-top: 15px;
      color: #219ce4;
    }

    .copy-text a {
      color: #15B9D9;
      font-weight: bold;
      text-decoration: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

</head>

<body>

<div class="register-box">

  <h2>Create Account</h2>

  <form method="post">
    {% csrf_token %}

    {% if form.errors %}
    <div class="alert alert-danger" style="color:red;">
      {% for key, value in form.errors.items %}
      <strong>{{ value }}</strong><br>
      {% endfor %}
    </div>
    {% endif %}

    <label>First Name</label>
    {{ form.first_name }}

    <label>Last Name</label>
    {{ form.last_name }}

    <label>Username</label>
    {{ form.username }}

    <label>Email</label>
    {{ form.email }}

    <label>Password</label>
    {{ form.password1 }}

    <label>Confirm Password</label>
    {{ form.password2 }}

    <button type="submit" class="btn-submit">Submit</button>

    <div class="copy-text">
      Already have an account? <a href="{% url 'login' %}">Login</a>
    </div>

  </form>

</div>

</body>
</html>
